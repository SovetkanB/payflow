services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  user-servise:
    build: ./services/user-service
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: userdb
      DB_SSL_MODE: disable
      JWT_SECRET: changeme-in-production
      JWT_EXPIRATION_HOURS: 24
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
